function hav(a,b){const R=6371,rad=x=>x*Math.PI/180,dlat=rad(b.lat-a.lat),dlon=rad(b.lon-a.lon);const h=Math.sin(dlat/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dlon/2)**2;return 2*R*Math.asin(Math.sqrt(h))}

function samePlace(a,b){return Math.abs(a.lat-b.lat)<.001&&Math.abs(a.lon-b.lon)<.001}

function offsetLatLngs(latlngs,meters=220){if(!latlngs||latlngs.length<2)return latlngs;return latlngs.map((p,i)=>{let prev=latlngs[Math.max(0,i-1)],next=latlngs[Math.min(latlngs.length-1,i+1)],lat=p[0],lon=p[1],cos=Math.max(.2,Math.cos(lat*Math.PI/180)),dx=(next[1]-prev[1])*cos,dy=next[0]-prev[0],len=Math.hypot(dx,dy)||1,nx=-dy/len,ny=dx/len;return [lat+(ny*meters/111320),lon+(nx*meters/(111320*cos))]})}

async function photo(q){if(photoCache.has(q))return photoCache.get(q);try{let u=`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(q)}&gsrnamespace=6&gsrlimit=8&prop=imageinfo&iiprop=url|mime&iiurlwidth=500&format=json&origin=*`;let j=await (await fetch(u)).json();let pages=j.query&&j.query.pages?Object.values(j.query.pages):[];let im=pages.map(p=>p.imageinfo&&p.imageinfo[0]).find(x=>x&&x.mime&&x.mime.startsWith('image/')&&x.thumburl);let r=im?im.thumburl:fallbackPhoto;photoCache.set(q,r);return r}catch(e){photoCache.set(q,fallbackPhoto);return fallbackPhoto}}

async function route(a,b){let k=`${a.lon},${a.lat}|${b.lon},${b.lat}`;if(routeCache.has(k))return routeCache.get(k);try{let u=`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=full&geometries=geojson&steps=false`;let j=await (await fetch(u)).json();if(j.code!=='Ok')throw Error();let r={latlngs:j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]),km:j.routes[0].distance/1000,min:j.routes[0].duration/60,source:'road'};routeCache.set(k,r);return r}catch(e){let km=hav(a,b)*1.28;let r={latlngs:[[a.lat,a.lon],[b.lat,b.lon]],km:km,min:(km/70)*60,source:'estimated'};routeCache.set(k,r);return r}}

function gallery(d){gtitle.textContent=`${dayLabel(d)} · ${d.date} 景点图片`;galleryEl.innerHTML='';d.points.forEach(p=>{let div=document.createElement('div');div.className='card';div.innerHTML=`<img src="${p.photo||fallbackPhoto}"><div><div class="name"><span class="badge" style="background:${d.color}">${p.id}</span>${p.name}</div><div class="meta">${p.note}</div></div>`;div.onclick=()=>map.flyTo([p.lat,p.lon],10,{duration:.8});galleryEl.appendChild(div)})}

async function animate(line,pts,t,m){let cur=[];for(let i=0;i<pts.length;i++){if(t!==token)return false;cur.push(pts[i]);line.setLatLngs(cur);m.setLatLng(pts[i]);if(i%3===0)await new Promise(r=>setTimeout(r,10))}return true}
async function drawDay(d,fit=true){let t=++token;gallery(d);sum.style.display='none';seglist.innerHTML='';if(drawnDays.has(d.day)){status.innerHTML=`<b>${dayLabel(d)} 已经绘制过。</b><br>需要重画请先点击“清除轨迹”。`;return};document.querySelector(`[data-day="${d.day}"]`).disabled=true;document.querySelector(`[data-quick="${d.day}"]`).disabled=true;status.innerHTML=`<b>正在计算 ${dayLabel(d)} 每段实际公路距离……</b>`;let layers=[],segs=[];d.points.forEach((p,i)=>{let mk=L.marker([p.lat,p.lon],{icon:photoIcon(p,d.color),zIndexOffset:600+i}).bindPopup(popup(p,d)).addTo(map);drawn.push(mk);layers.push(mk)});let mover=L.marker([d.points[0].lat,d.points[0].lon],{icon:pulseIcon(d.color),zIndexOffset:2000}).addTo(map);drawn.push(mover);for(let i=0;i<d.points.length-1;i++){let a=d.points[i],b=d.points[i+1];status.innerHTML=`<b>正在计算：${a.id} → ${b.id}</b><br>${a.name} → ${b.name}`;let r=await route(a,b);if(t!==token)return;let line=L.polyline([],{color:d.color,weight:5,opacity:.9,lineCap:'round',lineJoin:'round'}).addTo(map);drawn.push(line);layers.push(line);let shown=routeLatLngs(d,i,r);await animate(line,shown,t,mover);let seg={from:a,to:b,km:r.km,min:r.min,source:r.source};segs.push(seg);let txt=`${a.id} → ${b.id} · ${Math.round(r.km)} km · ${fmtMin(r.min)}${r.source==='road'?'':'*'}`;let lab=L.marker(midpoint(shown),{icon:labelIcon(txt,d.color),zIndexOffset:2200}).addTo(map);drawn.push(lab);layers.push(lab);renderSeg(d,segs);status.innerHTML=`<b>已绘制：${txt}</b><br>目前累计：约 ${Math.round(segs.reduce((s,x)=>s+x.km,0))} km · ${fmtMin(segs.reduce((s,x)=>s+x.min,0))}`;await new Promise(r=>setTimeout(r,120))}if(map.hasLayer(mover))map.removeLayer(mover);drawn.splice(drawn.indexOf(mover),1);drawnDays.add(d.day);let total=segs.reduce((s,x)=>s+x.km,0),mins=segs.reduce((s,x)=>s+x.min,0);status.innerHTML=`<b>${dayLabel(d)} 绘制完成：约 ${Math.round(total)} km · ${fmtMin(mins)}</b><br>${d.title}`;if(fit)map.fitBounds(L.featureGroup(layers).getBounds(),{padding:[70,70]})}
async function quickDay(d){let t=++token;gallery(d);sum.style.display='none';seglist.innerHTML='';if(drawnDays.has(d.day)){status.innerHTML=`<b>${dayLabel(d)} 已经显示过。</b><br>需要重画请先点击“清除轨迹”。`;return}document.querySelector(`[data-day="${d.day}"]`).disabled=true;document.querySelector(`[data-quick="${d.day}"]`).disabled=true;status.innerHTML=`<b>正在快速计算 ${dayLabel(d)} 总里程……</b>`;let layers=[],segs=[];d.points.forEach((p,i)=>{let mk=L.marker([p.lat,p.lon],{icon:photoIcon(p,d.color),zIndexOffset:600+i}).bindPopup(popup(p,d)).addTo(map);drawn.push(mk);layers.push(mk)});for(let i=0;i<d.points.length-1;i++){let a=d.points[i],b=d.points[i+1],r=await route(a,b);if(t!==token)return;let shown=routeLatLngs(d,i,r);let line=L.polyline(shown,{color:d.color,weight:5,opacity:.9,lineCap:'round',lineJoin:'round'}).addTo(map);drawn.push(line);layers.push(line);let seg={from:a,to:b,km:r.km,min:r.min,source:r.source};segs.push(seg);let txt=`${a.id} → ${b.id} · ${Math.round(r.km)} km · ${fmtMin(r.min)}${r.source==='road'?'':'*'}`;let lab=L.marker(midpoint(shown),{icon:labelIcon(txt,d.color),zIndexOffset:2200}).addTo(map);drawn.push(lab);layers.push(lab);renderSeg(d,segs)}drawnDays.add(d.day);let total=segs.reduce((s,x)=>s+x.km,0),mins=segs.reduce((s,x)=>s+x.min,0);status.innerHTML=`<b>${dayLabel(d)} 快速显示：约 ${Math.round(total)} km · ${fmtMin(mins)}</b><br>${d.title}`;if(layers.length)map.fitBounds(L.featureGroup(layers).getBounds(),{padding:[70,70]})}
async function quickExtra(d){let t=++token;sum.style.display='none';seglist.innerHTML='';status.innerHTML=`<b>正在快速计算：${d.title}</b>`;let layers=[],segs=[];d.points.forEach((p,i)=>{let mk=L.marker([p.lat,p.lon],{icon:refIcon(p.id,d.color),zIndexOffset:650+i}).bindPopup(`<b>${p.id} · ${p.name}</b><br>${p.note}`).addTo(map);drawn.push(mk);layers.push(mk)});for(let i=0;i<d.points.length-1;i++){let a=d.points[i],b=d.points[i+1],r=await route(a,b);if(t!==token)return;let shown=routeLatLngs(d,i,r);let line=L.polyline(shown,{color:d.color,weight:6,opacity:.92,lineCap:'round',lineJoin:'round',dashArray:'10 6'}).addTo(map);drawn.push(line);layers.push(line);let seg={from:a,to:b,km:r.km,min:r.min,source:r.source};segs.push(seg);let txt=`${a.id} → ${b.id} · ${Math.round(r.km)} km · ${fmtMin(r.min)}${r.source==='road'?'':'*'}`;let lab=L.marker(midpoint(shown),{icon:labelIcon(txt,d.color),zIndexOffset:2300}).addTo(map);drawn.push(lab);layers.push(lab);renderSeg(d,segs)}let total=segs.reduce((s,x)=>s+x.km,0),mins=segs.reduce((s,x)=>s+x.min,0);status.innerHTML=`<b>Landmannalaugar 北线往返：约 ${Math.round(total)} km · ${fmtMin(mins)}</b><br>走 Hella → Hrauneyjar → Sigöldugljúfur → Landmannalaugar → Hella；实际高地路通常会比在线估算更慢。`;if(layers.length)map.fitBounds(L.featureGroup(layers).getBounds(),{padding:[70,70]})}

function switchPlan(){clearAll();activeDays=activeDays===tripDays?planBDays:tripDays;renderDayControls(activeDays);let isB=activeDays===planBDays;document.getElementById('planB').textContent=isB?'Show Plan A Route':'Show Plan B Route';status.innerHTML=isB?'Plan B mode: day buttons and quick dots now use Plan B routes.':'Plan A mode: day buttons and quick dots restored.'}
async function playAll(){all.disabled=true;for(const d of activeDays){if(!drawnDays.has(d.day))await drawDay(d,false)}fitAll();all.disabled=false}
function clearAll(){token++;drawn.forEach(l=>map.hasLayer(l)&&map.removeLayer(l));drawn.length=0;drawnDays.clear();document.querySelectorAll('[data-day],[data-quick]').forEach(b=>b.disabled=false);all.disabled=false;status.innerHTML='当前：已清除全部轨迹。请选择 Day 1–Day 6。';sum.style.display='none';seglist.innerHTML='';gtitle.textContent='当天景点图片';galleryEl.innerHTML='<div class="box">点击某一天后，这里会显示当天景点照片和编号。</div>'}
function fitAll(){drawn.length?map.fitBounds(L.featureGroup(drawn.filter(l=>l.getBounds||l.getLatLng)).getBounds(),{padding:[70,70]}):map.fitBounds(bounds,{padding:[30,30]})}
async function searchPlace(){let q=searchInput.value.trim();if(!q)return;let norm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');let nq=norm(q),hit=searchIndex.find(x=>norm(x.name).includes(nq)||norm(x.tags).includes(nq));if(hit){map.flyTo([hit.lat,hit.lon],11,{duration:.8});hit.marker&&hit.marker.openPopup();status.innerHTML=`<b>已定位：${hit.name}</b><br>${hit.type}`;return}status.innerHTML=`<b>正在在线搜索：${q}</b><br>优先在冰岛范围内查找地点。`;try{let u=`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=is&q=${encodeURIComponent(q+' Iceland')}`;let j=await (await fetch(u,{headers:{'Accept':'application/json'}})).json();if(!j.length)throw Error();let r=j[0],lat=+r.lat,lon=+r.lon;map.flyTo([lat,lon],11,{duration:.8});let mk=L.marker([lat,lon],{icon:labelIcon('搜索结果','#2563eb'),zIndexOffset:2500}).bindPopup(`<b>${r.display_name}</b><br><small>OpenStreetMap 搜索结果</small>`).addTo(map).openPopup();drawn.push(mk);status.innerHTML=`<b>已定位在线搜索结果</b><br>${r.display_name}`}catch(e){status.innerHTML=`<b>没有找到：${q}</b><br>可以试试英文名、冰岛语名或更具体的地名。`}}
const btns=document.getElementById('btns'),legend=document.getElementById('legend'),galleryEl=document.getElementById('gallery'),gtitle=document.getElementById('gtitle'),status=document.getElementById('status'),sum=document.getElementById('sum'),seglist=document.getElementById('seglist'),all=document.getElementById('all'),searchInput=document.getElementById('searchInput'),searchBtn=document.getElementById('searchBtn'),searchList=document.getElementById('searchList'),searchIndex=[];
function addDayControl(d){let w=document.createElement('div');w.className='dayctl';let b=document.createElement('button');let isB=String(d.day).startsWith('B');let label=dayLabel(d);b.textContent=`${label} - ${d.date}`;b.style.background=d.color;b.dataset.day=d.day;b.onclick=()=>drawDay(d);let q=document.createElement('button');q.textContent='\u25cf';q.title=`Quick show ${label} route, distance, and driving time`;q.className='quick';q.style.background=d.color;q.dataset.quick=d.day;q.onclick=()=>quickDay(d);w.appendChild(b);w.appendChild(q);btns.appendChild(w);let lg=document.createElement('div');lg.className='leg daylegend';lg.innerHTML=`<i class="dot" style="background:${d.color}"></i><div><b>${label} - ${d.date}: ${d.title}</b><span>Stay: ${d.overnight}</span></div>`;legend.appendChild(lg)}
function renderDayControls(days){btns.innerHTML='';document.querySelectorAll('.daylegend').forEach(x=>x.remove());days.forEach(addDayControl)}
renderDayControls(activeDays);
tripDays.forEach(d=>{d.points.forEach(p=>{bounds.push([p.lat,p.lon]);let mk=L.marker([p.lat,p.lon],{icon:refIcon(p.id,d.color),zIndexOffset:10}).bindPopup(`<b>${p.id} - ${p.name}</b><br>${p.note}`).addTo(map);searchIndex.push({name:p.name,tags:`${p.id} ${p.note} ${dayLabel(d)} ${d.title}`,type:`${dayLabel(d)} route point`,lat:p.lat,lon:p.lon,marker:mk})})})
landmannalaugarRoute.points.forEach(p=>searchIndex.push({name:p.name,tags:`Landmannalaugar north route highland ${p.id} ${p.note}`,type:'Landmannalaugar north route',lat:p.lat,lon:p.lon,marker:null}));planBDays.flatMap(d=>d.points).forEach(p=>searchIndex.push({name:p.name,tags:`Plan B ${p.id} ${p.note}`,type:'Plan B route point',lat:p.lat,lon:p.lon,marker:null}));let cl=document.createElement('div');cl.className='leg';cl.innerHTML='<i class="dot" style="background:#dc2626"></i><div><b>Tesla Supercharger</b><span>红色闪电标记；Snæfellsnes 半岛暂无官方 Tesla 超充，需提前补电或使用其他快充。</span></div>';legend.appendChild(cl);superchargers.forEach(s=>{bounds.push([s.lat,s.lon]);let mk=L.marker([s.lat,s.lon],{icon:chargerIcon(),zIndexOffset:300}).bindPopup(`<b>⚡ ${s.name}</b><br>${s.address}<br>${s.stalls} · ${s.power}<br><small>${s.days}</small>`).addTo(map);searchIndex.push({name:s.name,tags:`Tesla Supercharger 超充 ${s.address} ${s.days}`,type:'Tesla Supercharger',lat:s.lat,lon:s.lon,marker:mk})})
let gp=document.createElement('div');gp.className='leg';let gc=googlePlaces.filter(p=>p.covered).length;gp.innerHTML=`<i class="dot" style="background:#16a34a"></i><div><b>Google Maps 收藏点</b><span>绿色 G = 已覆盖 ${gc} 个；紫色 G = 额外/高地 ${googlePlaces.length-gc} 个；共 ${googlePlaces.length} 个。</span></div>`;legend.appendChild(gp);googlePlaces.forEach((p,i)=>{bounds.push([p.lat,p.lon]);let mk=L.marker([p.lat,p.lon],{icon:savedIcon(p),zIndexOffset:450}).bindPopup(`<b>G${i+1}. ${p.name}</b><br>${p.covered?'已覆盖在当前攻略':'未正式放进当前攻略'}<br><small>${p.match}</small>`).addTo(map);searchIndex.push({name:p.name,tags:`Google Maps 收藏点 G${i+1} ${p.covered?'已覆盖':'额外 高地'} ${p.match}`,type:'Google Maps 收藏点',lat:p.lat,lon:p.lon,marker:mk})})
searchIndex.forEach(x=>{let o=document.createElement('option');o.value=x.name;searchList.appendChild(o)});searchBtn.onclick=searchPlace;searchInput.addEventListener('keydown',e=>{if(e.key==='Enter')searchPlace()});
map.fitBounds(bounds,{padding:[30,30]});document.getElementById('clear').onclick=clearAll;document.getElementById('land').onclick=()=>quickExtra(landmannalaugarRoute);document.getElementById('planB').onclick=switchPlan;all.onclick=playAll;loadPhotos();window.addEventListener('resize',()=>setTimeout(()=>map.invalidateSize(),150));
</script></body></html>
