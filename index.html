, "query": "Jökulsárlón Iceland", "photo": ""}, {"id": "4.2", "name": "Skaftafell", "lat": 64.015, "lon": -16.9667, "note": "Optional glacier hike", "query": "Skaftafell glacier Iceland", "photo": ""}, {"id": "4.3", "name": "Eldhraun Lava Field", "lat": 63.7076, "lon": -18.105, "note": "Lava field", "query": "Eldhraun lava field Iceland", "photo": ""}, {"id": "4.4", "name": "Vík", "lat": 63.4186, "lon": -19.006, "note": "Break / dinner", "query": "Vík Iceland village", "photo": ""}, {"id": "4.5", "name": "Hella", "lat": 63.8358, "lon": -20.4007, "note": "Overnight option", "query": "Hella Iceland", "photo": ""}, {"id": "4.6", "name": "Selfoss", "lat": 63.9335, "lon": -20.997, "note": "Overnight option", "query": "Selfoss Iceland", "photo": ""}]}, {"day": 5, "date": "6.16", "title": "Selfoss / Hella → Snæfellsnes Peninsula", "overnight": "Grundarfjörður / Stykkishólmur / Ólafsvík", "color": "#4E79A7", "points": [{"id": "5.1", "name": "Selfoss / Hella area", "lat": 63.9335, "lon": -20.997, "note": "Start", "query": "Selfoss Iceland town", "photo": ""}, {"id": "5.2", "name": "Borgarnes", "lat": 64.5383, "lon": -21.9206, "note": "Break / supplies", "query": "Borgarnes Iceland", "photo": ""}, {"id": "5.3", "name": "Gerðuberg Basalt Cliffs", "lat": 64.8598, "lon": -22.3599, "note": "Basalt cliffs", "query": "Gerðuberg basalt cliffs Iceland", "photo": ""}, {"id": "5.4", "name": "Búðakirkja Black Church", "lat": 64.8218, "lon": -23.384, "note": "Black church", "query": "Búðakirkja black church Iceland", "photo": ""}, {"id": "5.5", "name": "Arnarstapi", "lat": 64.7668, "lon": -23.6277, "note": "Coastal walk", "query": "Arnarstapi Iceland", "photo": ""}, {"id": "5.6", "name": "Lóndrangar", "lat": 64.7358, "lon": -23.773, "note": "Sea stacks", "query": "Lóndrangar Iceland", "photo": ""}, {"id": "5.7", "name": "Djúpalónssandur", "lat": 64.753, "lon": -23.8986, "note": "Black pebble beach", "query": "Djúpalónssandur Iceland", "photo": ""}, {"id": "5.8", "name": "Kirkjufell", "lat": 64.9417, "lon": -23.3069, "note": "Mountain / sunset spot", "query": "Kirkjufell Iceland", "photo": ""}, {"id": "5.9", "name": "Grundarfjörður", "lat": 64.9243, "lon": -23.263, "note": "Overnight option", "query": "Grundarfjörður Iceland", "photo": ""}, {"id": "5.10", "name": "Stykkishólmur", "lat": 65.0754, "lon": -22.7298, "note": "Overnight option", "query": "Stykkishólmur Iceland", "photo": ""}]}, {"day": 6, "date": "6.17", "title": "Snæfellsnes → Reykjavík / Keflavík", "overnight": "Return / airport", "color": "#B07AA1", "points": [{"id": "6.1", "name": "Grundarfjörður", "lat": 64.9243, "lon": -23.263, "note": "Start", "query": "Grundarfjörður Iceland", "photo": ""}, {"id": "6.2", "name": "Stykkishólmur", "lat": 65.0754, "lon": -22.7298, "note": "Town / optional stop", "query": "Stykkishólmur Iceland", "photo": ""}, {"id": "6.3", "name": "Berserkjahraun Lava Field", "lat": 64.9998, "lon": -22.9756, "note": "Lava field", "query": "Berserkjahraun Iceland", "photo": ""}, {"id": "6.4", "name": "Borgarnes", "lat": 64.5383, "lon": -21.9206, "note": "Break", "query": "Borgarnes Iceland", "photo": ""}, {"id": "6.5", "name": "Reykjavík", "lat": 64.1466, "lon": -21.9426, "note": "Return", "query": "Reykjavík Iceland", "photo": ""}, {"id": "6.6", "name": "Keflavík Airport", "lat": 63.985, "lon": -22.6056, "note": "Airport option", "query": "Keflavík International Airport Iceland", "photo": ""}]}];

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
const fallbackPhoto='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="360" height="240"><defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#fef3c7"/></linearGradient></defs><rect width="360" height="240" fill="url(#g)"/><path d="M0 168 C75 120 145 145 205 108 C270 69 320 98 360 72 L360 240 L0 240 Z" fill="#64748b"/><text x="30" y="130" font-family="Arial" font-size="24" font-weight="700" fill="#334155">Photo loading...</text></svg>`);
const photoCache=new Map(), routeCache=new Map(), drawn=[], drawnDays=new Set(), bounds=[]; let token=0;
function icon(html,size,anchor){return L.divIcon({className:'',html,iconSize:size,iconAnchor:anchor})}
function refIcon(id,c){return icon(`<div class="ref" style="background:${c}">${id}</div>`,[34,22],[17,11])}
function photoIcon(p,c){return icon(`<div class="photo"><img src="${p.photo||fallbackPhoto}"><span style="background:${c}">${p.id}</span></div>`,[88,70],[44,70])}
function pulseIcon(c){return icon(`<div class="pulse" style="color:${c}"></div>`,[22,22],[11,11])}
function labelIcon(t,c){return icon(`<div class="dlabel" style="border-color:${c}55">${t}</div>`,null,[50,12])}
function hav(a,b){const R=6371,rad=x=>x*Math.PI/180,dlat=rad(b.lat-a.lat),dlon=rad(b.lon-a.lon);const h=Math.sin(dlat/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dlon/2)**2;return 2*R*Math.asin(Math.sqrt(h))}
function fmtMin(m){m=Math.round(m);let h=Math.floor(m/60),min=m%60;return h?`${h}h ${min}m`:`${min}m`}
async function photo(q){if(photoCache.has(q))return photoCache.get(q);try{let u=`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(q)}&gsrnamespace=6&gsrlimit=8&prop=imageinfo&iiprop=url|mime&iiurlwidth=500&format=json&origin=*`;let j=await (await fetch(u)).json();let pages=j.query&&j.query.pages?Object.values(j.query.pages):[];let im=pages.map(p=>p.imageinfo&&p.imageinfo[0]).find(x=>x&&x.mime&&x.mime.startsWith('image/')&&x.thumburl);let r=im?im.thumburl:fallbackPhoto;photoCache.set(q,r);return r}catch(e){photoCache.set(q,fallbackPhoto);return fallbackPhoto}}
async function loadPhotos(){for(const p of tripDays.flatMap(d=>d.points)){p.photo=await photo(p.query)}}
async function route(a,b){let k=`${a.lon},${a.lat}|${b.lon},${b.lat}`;if(routeCache.has(k))return routeCache.get(k);try{let u=`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=full&geometries=geojson&steps=false`;let j=await (await fetch(u)).json();if(j.code!=='Ok')throw Error();let r={latlngs:j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]),km:j.routes[0].distance/1000,min:j.routes[0].duration/60,source:'road'};routeCache.set(k,r);return r}catch(e){let km=hav(a,b)*1.28;let r={latlngs:[[a.lat,a.lon],[b.lat,b.lon]],km:km,min:(km/70)*60,source:'estimated'};routeCache.set(k,r);return r}}
function midpoint(arr){return arr[Math.floor(arr.length/2)]}
function popup(p,d){return `<b>${p.id} · ${p.name}</b><br>${p.note}<br><img class="popup-img" src="${p.photo||fallbackPhoto}"><small>Day ${d.day} · ${d.title}</small><br><small>住宿：${d.overnight}</small>`}
function gallery(d){gtitle.textContent=`Day ${d.day} · ${d.date} 景点图片`;galleryEl.innerHTML='';d.points.forEach(p=>{let div=document.createElement('div');div.className='card';div.innerHTML=`<img src="${p.photo||fallbackPhoto}"><div><div class="name"><span class="badge" style="background:${d.color}">${p.id}</span>${p.name}</div><div class="meta">${p.note}</div></div>`;div.onclick=()=>map.flyTo([p.lat,p.lon],10,{duration:.8});galleryEl.appendChild(div)})}
function renderSeg(d,segs){let total=segs.reduce((s,x)=>s+x.km,0),mins=segs.reduce((s,x)=>s+x.min,0),est=segs.some(x=>x.source!=='road');sum.style.display='block';sum.innerHTML=`<b>Day ${d.day} 当日公路里程：约 ${Math.round(total)} km</b><br><b>大概纯驾驶时间：约 ${fmtMin(mins)}</b><br>${est?'*星号路段为路线服务失败后的备用估算。':'距离和时间来自在线公路路线计算，可能与 Google Maps 有少量差异。'}`;seglist.innerHTML='';segs.forEach(s=>{let row=document.createElement('div');row.className='seg';row.innerHTML=`<div>${s.from.id} ${s.from.name} → ${s.to.id} ${s.to.name}</div><div class="km">${Math.round(s.km)} km<br>${fmtMin(s.min)}</div>`;seglist.appendChild(row)})}
async function animate(line,pts,t,m){let cur=[];for(let i=0;i<pts.length;i++){if(t!==token)return false;cur.push(pts[i]);line.setLatLngs(cur);m.setLatLng(pts[i]);if(i%3===0)await new Promise(r=>setTimeout(r,10))}return true}
async function drawDay(d,fit=true){let t=++token;gallery(d);sum.style.display='none';seglist.innerHTML='';if(drawnDays.has(d.day)){status.innerHTML=`<b>Day ${d.day} 已经绘制过。</b><br>需要重画请先点击“清除轨迹”。`;return};document.querySelector(`[data-day="${d.day}"]`).disabled=true;status.innerHTML=`<b>正在计算 Day ${d.day} 每段实际公路距离……</b>`;let layers=[],segs=[];d.points.forEach((p,i)=>{let mk=L.marker([p.lat,p.lon],{icon:photoIcon(p,d.color),zIndexOffset:600+i}).bindPopup(popup(p,d)).addTo(map);drawn.push(mk);layers.push(mk)});let mover=L.marker([d.points[0].lat,d.points[0].lon],{icon:pulseIcon(d.color),zIndexOffset:2000}).addTo(map);drawn.push(mover);for(let i=0;i<d.points.length-1;i++){let a=d.points[i],b=d.points[i+1];status.innerHTML=`<b>正在计算：${a.id} → ${b.id}</b><br>${a.name} → ${b.name}`;let r=await route(a,b);if(t!==token)return;let line=L.polyline([],{color:d.color,weight:5,opacity:.9,lineCap:'round',lineJoin:'round'}).addTo(map);drawn.push(line);layers.push(line);await animate(line,r.latlngs,t,mover);let seg={from:a,to:b,km:r.km,min:r.min,source:r.source};segs.push(seg);let txt=`${a.id} → ${b.id} · ${Math.round(r.km)} km · ${fmtMin(r.min)}${r.source==='road'?'':'*'}`;let lab=L.marker(midpoint(r.latlngs),{icon:labelIcon(txt,d.color),zIndexOffset:2200}).addTo(map);drawn.push(lab);layers.push(lab);renderSeg(d,segs);status.innerHTML=`<b>已绘制：${txt}</b><br>目前累计：约 ${Math.round(segs.reduce((s,x)=>s+x.km,0))} km · ${fmtMin(segs.reduce((s,x)=>s+x.min,0))}`;await new Promise(r=>setTimeout(r,120))}if(map.hasLayer(mover))map.removeLayer(mover);drawn.splice(drawn.indexOf(mover),1);drawnDays.add(d.day);let total=segs.reduce((s,x)=>s+x.km,0),mins=segs.reduce((s,x)=>s+x.min,0);status.innerHTML=`<b>Day ${d.day} 绘制完成：约 ${Math.round(total)} km · ${fmtMin(mins)}</b><br>${d.title}`;if(fit)map.fitBounds(L.featureGroup(layers).getBounds(),{padding:[70,70]})}
async function playAll(){all.disabled=true;for(const d of tripDays){if(!drawnDays.has(d.day))await drawDay(d,false)}fitAll();all.disabled=false}
function clearAll(){token++;drawn.forEach(l=>map.hasLayer(l)&&map.removeLayer(l));drawn.length=0;drawnDays.clear();document.querySelectorAll('[data-day]').forEach(b=>b.disabled=false);all.disabled=false;status.innerHTML='当前：已清除全部轨迹。请选择 Day 1–Day 6。';sum.style.display='none';seglist.innerHTML='';gtitle.textContent='当天景点图片';galleryEl.innerHTML='<div class="box">点击某一天后，这里会显示当天景点照片和编号。</div>'}
function fitAll(){drawn.length?map.fitBounds(L.featureGroup(drawn.filter(l=>l.getBounds||l.getLatLng)).getBounds(),{padding:[70,70]}):map.fitBounds(bounds,{padding:[30,30]})}
const btns=document.getElementById('btns'),legend=document.getElementById('legend'),galleryEl=document.getElementById('gallery'),gtitle=document.getElementById('gtitle'),status=document.getElementById('status'),sum=document.getElementById('sum'),seglist=document.getElementById('seglist'),all=document.getElementById('all');
tripDays.forEach(d=>{let b=document.createElement('button');b.textContent=`Day ${d.day} · ${d.date}`;b.style.background=d.color;b.dataset.day=d.day;b.onclick=()=>drawDay(d);btns.appendChild(b);let lg=document.createElement('div');lg.className='leg';lg.innerHTML=`<i class="dot" style="background:${d.color}"></i><div><b>Day ${d.day} · ${d.date}：${d.title}</b><span>住宿：${d.overnight}</span></div>`;legend.appendChild(lg);d.points.forEach(p=>{bounds.push([p.lat,p.lon]);L.marker([p.lat,p.lon],{icon:refIcon(p.id,d.color),zIndexOffset:10}).bindPopup(`<b>${p.id} · ${p.name}</b><br>${p.note}`).addTo(map)})})
map.fitBounds(bounds,{padding:[30,30]});document.getElementById('clear').onclick=clearAll;all.onclick=playAll;loadPhotos();window.addEventListener('resize',()=>setTimeout(()=>map.invalidateSize(),150));
</script></body></html>
